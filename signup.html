<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- EXTERNAL CSS -->
    <link rel="stylesheet" type="text/css" href="players.css">
    <title>OBMC Intramurals Site</title>
</head>

<body>
    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand" target="_self" class="mt-4"
                style="font-size: 15px; font-weight: bold">
                <img class="img-responsive" src="logo.png" style="max-width: 50px; margin-right: 10px">OBMC Intramurals Page 
            </a>

            <button class="navbar-toggler" type="button" aria-controls="navbarNav" aria-expanded="false"
                data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav navbar-center ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="signup.html" target="_self">🌐 SIGN UP</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="teams.html" target="_self">🎯 TEAMS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="players.html" target="_self">📌 PLAYERS</a>
                    </li>
                </ul>
                <ul class="navbar-nav navbar-center navbar-expand-lg ms-auto">
                    <div class="navbar-search">
                        <input type="search" placeholder="Search for..." name="search">
                        <button>Input</button>
                    </div>
                </ul>
            </div>
        </div>
    </nav>
    <br>

    <!-- ALERT BUTTON -->
    <div class="container-fluid mt-1 mb-3 alert alert-success alert-dismissible fade show" role="alert"
        style="text-align: center; font-weight: 400; max-width: 95%;">Please wait for five seconds before
        clicking on the button. <strong>Otherwise, it will display an error.</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- CREATE ACCOUNT -->
    <div class="container mt-5 mb-6">
        <h2 class="mt-2 mb-2">Create An Account!</h2>
        <input class="mt-2 mb-2" type="text" name="username" id="username" placeholder="Enter your username..."><br>
        <input class="mt-2 mb-2" type="email" name="email" id="email" placeholder="Enter your email..."><br>
        <input class="mt-2 mb-2" type="password" name="password" id="password" placeholder="Enter an 8-digit password..."><br>
        <button class="btn mt-2 mb-2" py-click="create_username" id="btn">Click Here!</button>
        <div class="msg mt-2 mb-2" id="msg"></div>
    </div>
    
    <!-- PYTHON SCRIPT -->
    <script type="py" src="signup.py"></script>
</body>
</html>
